name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Generate src/routeTree.gen.ts (gitignored, produced by the TanStack
      # Start vite plugin at build time) before type-checking so tsc can
      # resolve the './routeTree.gen' module imported by src/router.tsx.
      - run: pnpm build

      - run: pnpm check

      - run: pnpm lint

      - run: pnpm test
