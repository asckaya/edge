# ============================================================
# proxy.yaml — 订阅转换器配置文件
# 使用方法：
#   bun gen-url.ts                       # Mihomo / Clash Meta (默认 Full)
#   bun gen-url.ts --type mihomo-dual    # Mihomo 双模 (推荐)
#   bun gen-url.ts --type stash          # Stash iOS 完整版
#   bun gen-url.ts --type stash-mini     # Stash iOS 内存优化版 (<50 MB)
#   bun gen-url.ts --type sing-box       # sing-box 1.13+ JSON 配置
# ============================================================

# Worker 部署地址（必填，改为你自己的域名）
worker: https://your-worker.workers.dev/

# 用于保护订阅链接的密码（可选，留空则不鉴权）
secret: "your-secret-password"

# GitHub 规则源加速前缀 (可选)
# gh_proxy: https://mirror.ghproxy.com/

# ============================================================
# 订阅提供商 (机场订阅)
# 每条订阅会生成独立的 proxy-provider，名称作为 URL 参数 key
# ============================================================
provider:
  - name: Airport1
    url: https://your-airport-1.com/subscribe/token123

  - name: Airport2
    url: https://your-airport-2.com/api/v1/client/subscribe?token=abc456

  # 更多订阅...
  # - name: Airport3
  #   url: https://...

# ============================================================
# 自建节点 (直接写单节点配置，会出现在 Self-Hosted 节点组)
# 支持协议: hysteria2 / vless / trojan / ss / vmess / wireguard / tuic
# ============================================================
proxy:

  # --- Hysteria2 示例 (单端口) ---
  - name: "My-Hy2"
    type: hysteria2
    server: your-server.example.com
    port: 443
    password: your-password
    sni: your-server.example.com
    alpn: [h3]
    skip-cert-verify: false    # false=验证证书 true=跳过验证

  # --- VLESS + REALITY 示例 ---
  - name: "My-VLESS-Reality"
    type: vless
    server: your-server.example.com
    port: 443
    uuid: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    network: grpc
    security: reality
    servername: www.bing.com
    reality-opts:
      public-key: your-reality-public-key
      short-id: your-short-id

  # --- WireGuard 示例 ---
  - name: "My-WG"
    type: wireguard
    server: your-server.example.com
    port: 51820
    ip: 10.0.0.1
    public-key: your-wg-public-key
    private-key: your-wg-private-key
    mtu: 1420
    reserved: [1, 2, 3]

  # --- Shadowsocks 示例 ---
  - name: "My-SS"
    type: ss
    server: your-server.example.com
    port: 8388
    cipher: aes-256-gcm   # 常用: aes-256-gcm / chacha20-ietf-poly1305
    password: your-ss-password

# ============================================================
# 配置模式对比 (Type 参数)
#
# *-full:  精细化分流 (60+ 分组, 覆盖 AI/媒体/开发等)
# *-dual:  双模分流 (推荐, 全量规则但合并国外场景为统一选择)
# *-mini:  白名单模式 (全局代理, 仅国内直连, iOS 首选)
# *-micro: 黑名单模式 (全局直连, 仅规则匹配代理)
# ============================================================
