proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [⚡ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, 🇹🇼 台湾节点, Self-Hosted, DIRECT]

  - name: 🔒 国内服务
    type: select
    proxies: [DIRECT, REJECT, 🚀 节点选择, ⚡ BYG 自动选择, ⚡ Kitty 自动选择, ⚡ Glados 自动选择]
    include-all-proxies: true
    use: [BYG, Kitty, Glados]

  - name: 🛒 购物网站
    type: select
    proxies: [🚀 节点选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇼🇸 台湾节点, DIRECT, REJECT, ⚡ BYG 自动选择, ⚡ Kitty 自动选择, ⚡ Glados 自动选择]
    include-all-proxies: true
    use: [BYG, Kitty, Glados]

  - name: 🛑 广告拦截
    type: select
    proxies:
