mode: rule
find-process-mode: strict

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  nameserver-policy:
    "geosite:cn,private,apple,microsoft@cn,steam@cn,onedrive":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:category-ads-all": rcode://success
  fallback:
    - 8.8.8.8
    - 114.114.114.114
  fallback-filter:
    geoip: true
    ipcidr: [240.0.0.0/4, 0.0.0.0/32, 127.0.0.1/32]
    domain:
      - +.google.com
      - +.facebook.com
      - +.twitter.com
      - +.youtube.com
      - +.google.cn
      - +.googleapis.cn
      - +.googleapis.com
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.home.arpa"
    - "+.tailscale.net"
    - "+.ts.net"
    - "+.et.net"
    - "+.easytier.cn"
    - "+.easytier.top"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "geosite:cn"

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    TLS: { ports: [443, 8443] }
    HTTP: { ports: [80, 8080-8880], override-destination: true }
    QUIC: { ports: [443, 8443] }
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"

geo-auto-update: true
geo-update-interval: 24


rules:
  # 广告拦截
  - GEOSITE,category-ads-all,🛑 广告拦截

  # SSH 直连
  - DST-PORT,22,DIRECT

  # P2P 直连
  - DST-PORT,11010,DIRECT

  # 局域网 & 私有网络
  - GEOIP,private,DIRECT,no-resolve
  - GEOSITE,private,DIRECT
  - DOMAIN-SUFFIX,et.net,DIRECT
  - DOMAIN-SUFFIX,ts.net,DIRECT

  # 国内直连 (White-list: CN services go DIRECT)
  - GEOSITE,google-cn,🔒 国内服务
  - GEOSITE,apple-cn,🔒 国内服务
  - GEOSITE,microsoft@cn,🔒 国内服务
  - GEOSITE,steam@cn,🔒 国内服务
  - GEOSITE,onedrive,🔒 国内服务
  - GEOSITE,category-ai-cn,🔒 国内服务
  - GEOSITE,category-games@cn,🔒 国内服务
  - GEOSITE,category-netdisk-cn,🔒 国内服务
  - GEOSITE,category-ecommerce@cn,🔒 国内服务
  - GEOSITE,category-collaborate-cn,🔒 国内服务
  - GEOSITE,category-scholar-cn,🔒 国内服务
  - GEOSITE,category-bank-cn,🔒 国内服务
  - GEOSITE,geolocation-cn,🔒 国内服务
  - GEOSITE,cn,🔒 国内服务
  - GEOIP,cn,🔒 国内服务,no-resolve

  # 非中国兜底（代理）
  - GEOSITE,geolocation-!cn,🐟 漏网之鱼

  # 漏网之鱼
  - MATCH,🐟 漏网之鱼
