name = "edge"
main = "src/server.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]

# 短链接功能用的 KV namespace
# 1. Dashboard > Workers & Pages > KV > Create namespace, 名字随意 (例如 edge-links)
# 2. 复制创建后的 namespace ID 填到下方 id 字段
# 3. 重新部署 (git push 或手动)
[[kv_namespaces]]
binding = "EDGE_KV"
id = "dc7b3efaf67e4460848d310960daef81"

# TanStack Start prerendered assets and Vite build output
# run_worker_first = true ensures the Worker (src/server.ts) handles every
# request first, so /?query goes to the Hono config renderer instead of being
# served as a static index.html.
[assets]
directory = ".output/public"
binding = "ASSETS"
run_worker_first = true

# 收集日志和 traces 用于调试 Worker
[observability]
enabled = false

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
