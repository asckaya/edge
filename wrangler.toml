name = "edge"
main = "index.ts"
compatibility_date = "2026-01-20"

[assets]
directory = "./web-ui/out"
binding = "ASSETS"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1